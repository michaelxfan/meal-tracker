    "serving_note": "per ~1.5 cup serving (serves 5)",
    "good": {
      "ingredients": ["lean beef","potatoes","carrots","onions","beef broth","Worcestershire sauce","salt","pepper","bay leaf"],
      "method": "Instant Pot, 25 min. Everything in together.",
      "nutrition": {"calories": 340,"protein_g": 34,"carbs_g": 28,"fat_g": 10,"fiber_g": 4}
    },
    "best": {
      "ingredients": ["beef chuck, cut into 2-inch cubes","Yukon Gold potatoes","carrots, cut on the bias","pearl onions (or 2 yellow onions, roughly chopped)","lardons or thick-cut bacon, diced","homemade or high-quality unsalted beef stock","1 cup dry red wine (Burgundy or Côtes du Rhône)","2 tbsp tomato paste","fresh thyme + bay leaves","Worcestershire sauce, to finish","flour, for dredging"],
      "method": "Salt beef generously 30 min ahead (dry brine). Pat dry, dredge lightly in flour, sear in batches in a hot Dutch oven until deeply browned on all sides — don't crowd the pan. Remove beef. Render lardons, sauté onions and carrots in the fat until softened. Add tomato paste, cook 2 min until it darkens and smells nutty. Deglaze with red wine, scraping up every bit of fond. Add stock, thyme, bay leaves, and seared beef. Braise in a 325°F oven 2–2.5 hours (or Instant Pot 35 min high pressure). Add potatoes in the last 30 min. Finish with a splash of Worcestershire and fresh parsley.",
      "nutrition": {"calories": 490,"protein_g": 36,"carbs_g": 32,"fat_g": 24,"fiber_g": 4},
      "why_better": [
        "Chuck has abundant intramuscular fat that renders during the braise, self-basting every cube and keeping it tender — lean beef has no protection and turns dry and fibrous under heat",
        "Searing in batches on a dry surface creates a deep Maillard crust: dozens of new aromatic compounds that the Instant Pot's boiling environment can never develop; this crust is the flavour backbone of the whole dish",
        "Darkening the tomato paste before deglazing drives off its raw, tinny edge and concentrates its umami; the red wine then lifts all the caramelised fond from the pan — that fond is pure concentrated flavour that would otherwise be scrubbed off and lost"
      ]
    }
  }
];

meals.sort((a, b) => b.date_logged.localeCompare(a.date_logged));

document.getElementById('count').textContent = meals.length + ' entries logged';

// Build summary
const ORDER = ['breakfast', 'lunch', 'snack', 'dinner'];
const groups = {};
ORDER.forEach(c => groups[c] = []);
meals.forEach(m => {
  const cat = m.category.toLowerCase();
  if (groups[cat]) groups[cat].push(m);
  // categories not in ORDER are silently skipped in summary
});
const hasSome = ORDER.some(c => groups[c].length > 0);
if (hasSome) {
  const summaryEl = document.getElementById('summary');
  summaryEl.innerHTML = '<div class="summary"><h2>Summary</h2><div class="summary-groups" id="summary-groups"></div></div>';
  const groupsEl = document.getElementById('summary-groups');
  ORDER.forEach(cat => {
    if (!groups[cat].length) return;
    const div = document.createElement('div');
    div.className = 'summary-group';
    div.innerHTML = `<div class="summary-group-label ${cat}">${cat}</div><ul>${groups[cat].map(m => `<li><a href="#${m.id}">${esc(m.name)}</a></li>`).join('')}</ul>`;
    groupsEl.appendChild(div);
  });
}

// Build takeout block
const takeoutData = {
  'Pick Up': ['Zen Kyoto', 'ImPerfect Eats', 'Bestco', 'Jimmy the Greek'],
  'Uber Eats': ["Mandy's"]
};
const convEl = document.getElementById('takeout');
convEl.innerHTML = '<div class="takeout"><h2>Take Out</h2><div class="takeout-groups" id="takeout-groups"></div></div>';
const convGroupsEl = document.getElementById('takeout-groups');
Object.entries(takeoutData).forEach(([label, items]) => {
  const div = document.createElement('div');
  div.className = 'takeout-group';
  div.innerHTML = `<div class="takeout-group-label">${esc(label)}</div><ul>${items.map(i => `<li>${esc(i)}</li>`).join('')}</ul>`;
  convGroupsEl.appendChild(div);
});

function badgeClass(cat) {
  const map = { breakfast: 'badge-breakfast', lunch: 'badge-lunch', dinner: 'badge-dinner', snack: 'badge-snack', wellness: 'badge-wellness' };
  return map[cat.toLowerCase()] || 'badge-snack';
}

function nutPills(nut) {
  if (!nut) return '';
  const items = [
    nut.calories != null ? nut.calories + ' kcal' : null,
    nut.protein_g != null ? nut.protein_g + 'g protein' : null,
    nut.fat_g != null ? nut.fat_g + 'g fat' : null,
    nut.carbs_g != null ? nut.carbs_g + 'g carbs' : null,
    nut.fiber_g != null ? nut.fiber_g + 'g fiber' : null
  ].filter(Boolean);
  return items.length ? '<div class="nutrition">' + items.map(i => '<span class="nut-pill">' + i + '</span>').join('') + '</div>' : '';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const app = document.getElementById('app');
meals.forEach(m => {
  const card = document.createElement('div');
  card.className = 'meal-card';
  card.id = m.id;
  card.innerHTML = `
    <div class="meal-header">
      <h2>${esc(m.name)}</h2>
      <span class="badge ${badgeClass(m.category)}">${esc(m.category)}</span>
      <span class="cuisine">${esc(m.cuisine)}</span>
      <span class="date">${esc(m.date_logged)}</span>
      ${m.serving_note ? '<span class="serving-note">' + esc(m.serving_note) + '</span>' : ''}
    </div>
    <div class="versions">
      <div class="version-panel good">
        <div class="version-label">Good</div>
        <h4>Ingredients</h4>
        <ul>${m.good.ingredients.map(i => '<li>' + esc(i) + '</li>').join('')}</ul>
        <h4>Method</h4>
        <p>${esc(m.good.method)}</p>
        ${nutPills(m.good.nutrition)}
      </div>
      <div class="version-panel best">
        <div class="version-label">Best</div>
        <h4>Ingredients</h4>
        <ul>${m.best.ingredients.map(i => '<li>' + esc(i) + '</li>').join('')}</ul>
        <h4>Method</h4>
        <p>${esc(m.best.method)}</p>
        ${nutPills(m.best.nutrition)}
        ${m.best.why_better ? '<div class="why-better"><h4>Why it\'s better</h4><ul>' + m.best.why_better.map(w => '<li>' + esc(w) + '</li>').join('') + '</ul></div>' : ''}
      </div>
    </div>
  `;
  app.appendChild(card);
});
</script>
</body>
</html>
